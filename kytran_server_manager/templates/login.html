{% extends "base.html" %}
{% block title %}Login - {{ sysops_theme.product_name if sysops_theme else 'Kytran Server Manager' }}{% endblock %}
{% block content %}
<div class="ksm-auth-container">
    <div class="ksm-auth-card">
        <h1><i class="fas fa-server"></i> {{ sysops_theme.product_name if sysops_theme else 'Kytran Server Manager' }}</h1>
        <form method="POST">
            <div class="ksm-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="ksm-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="ksm-btn ksm-btn-primary">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
