version: "3.8"

services:
  kytran-system-operations:
    build: .
    container_name: kytran-system-operations
    ports:
      - "8085:8085"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    environment:
      - KSM_SECRET_KEY=change-me-in-production
      - KSM_THEME=kytran
      - KYTRAN_CLIENT_ID=kso
      - KYTRAN_AUTH_URL=https://archie.kytranempowerment.com
      - KYTRAN_REDIRECT_URI=https://sysops.kytranempowerment.com/auth/sso/callback
      # KYTRAN_CLIENT_SECRET — set via .env or Docker secret
    restart: unless-stopped
